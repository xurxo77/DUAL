<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Dual - Soldadura y Calderería</title>
    <style>
        /* Estilos minimalistas y limpios */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f6f8; 
            color: #333;
            margin: 0;
            padding: 20px;
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { margin-bottom: 5px; color: #1a73e8; }
        
        /* Sistema de rejilla para las tarjetas */
        .grid-alumnos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 24px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        /* Diseño de la tarjeta de cada alumno */
        .tarjeta { 
            background: white; 
            border-radius: 12px; 
            padding: 24px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            text-align: center;
            transition: transform 0.2s;
        }
        .tarjeta:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        
        /* Estilo de la foto circular */
        .foto { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            object-fit: cover; 
            margin-bottom: 15px; 
            border: 3px solid #e8eaed; 
        }
        
        /* Lista de datos cruzados */
        .datos { text-align: left; margin-bottom: 20px; }
        .datos p { margin: 6px 0; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 4px;}
        .etiqueta { font-weight: 600; color: #5f6368; display: inline-block; width: 90px; }
        
        /* Botón de WhatsApp */
        .btn-whatsapp { 
            display: inline-block; 
            background-color: #25D366; 
            color: white; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            width: 100%; 
            box-sizing: border-box; 
        }
        .btn-whatsapp:hover { background-color: #1ebe5d; }
        
        .cargando { text-align: center; font-size: 18px; color: #666; margin-top: 50px; }
        footer { text-align: center; margin-top: 50px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

    <header>
        <h1>Alumnos en Prácticas / Histórico</h1>
        <p>Departamento de Soldadura y Calderería</p>
    </header>

    <div id="cargando" class="cargando">Cargando base de datos...</div>
    <div id="contenedor-alumnos" class="grid-alumnos"></div>

    <footer>
        IES ACCI - Centro 18009213 | Plataforma de Gestión Dual
    </footer>

    <script>
        // === 1. PEGA AQUÍ TU URL DE APPS SCRIPT ===
        const API_URL = 'https://script.google.com/macros/s/TU_CODIGO_LARGO_AQUI/exec';

        // === 2. FUNCIÓN FETCH PARA LEER LOS DATOS ===
        async function cargarAlumnos() {
            try {
                // Hacemos la llamada al script de Google
                const respuesta = await fetch(API_URL);
                const alumnos = await respuesta.json();
                
                // Ocultamos el texto de "Cargando..."
                document.getElementById('cargando').style.display = 'none'; 
                
                // Mandamos a dibujar las tarjetas
                dibujarTarjetas(alumnos);
            } catch (error) {
                console.error("Error de conexión:", error);
                document.getElementById('cargando').innerText = "Hubo un error al cargar los datos. Revisa la consola.";
            }
        }

        // === 3. FUNCIÓN PARA DIBUJAR EL HTML DE CADA ALUMNO ===
        function dibujarTarjetas(alumnos) {
            const contenedor = document.getElementById('contenedor-alumnos');
            contenedor.innerHTML = ''; 

            alumnos.forEach(alumno => {
                // Limpiar el teléfono por si pusiste espacios en el Excel
                const telefonoLimpio = alumno.Teléfono ? String(alumno.Teléfono).replace(/\s/g, '') : '';
                const linkWhatsApp = telefonoLimpio ? `https://wa.me/${telefonoLimpio}` : '#';

                // Si el alumno no tiene foto en la columna, ponemos un avatar por defecto
                const urlFoto = alumno.Foto_URL || 'https://ui-avatars.com/api/?background=random&name=' + encodeURIComponent(alumno.Nombre_Completo);

                // Construimos el bloque de HTML para cada uno
                const tarjetaHTML = `
                    <div class="tarjeta">
                        <img src="${urlFoto}" alt="Foto" class="foto">
                        <h3 style="margin: 0 0 15px 0;">${alumno.Nombre_Completo}</h3>
                        
                        <div class="datos">
                            <p><span class="etiqueta">Curso:</span> ${alumno.Curso_Actual} (${alumno.Grado})</p>
                            <p><span class="etiqueta">Localidad:</span> ${alumno.Localidad_Residencia}</p>
                            <p><span class="etiqueta">Vehículo:</span> ${alumno.Vehículo_Propio}</p>
                            <p><span class="etiqueta">Movilidad:</span> ${alumno.Movilidad_Geográfica}</p>
                        </div>

                        ${telefonoLimpio 
                            ? `<a href="${linkWhatsApp}" target="_blank" class="btn-whatsapp">WhatsApp</a>` 
                            : `<div style="padding: 12px; background: #eee; border-radius: 8px; color: #666;">Sin teléfono</div>`}
                    </div>
                `;
                
                // Lo inyectamos en la página
                contenedor.innerHTML += tarjetaHTML;
            });
        }

        // Arrancamos la aplicación
        cargarAlumnos();
    </script>

</body>
</html>
